default_language_version:
  python: python3.12

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run --no-sync ruff check --fix
        language: system
        types: [python]
        require_serial: true

      - id: ruff-format
        name: ruff format
        entry: uv run --no-sync ruff format
        language: system
        types: [python]
        require_serial: true

      - id: pyright
        name: pyright
        entry: uv run --no-sync pyright src/
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true

      - id: pytest
        name: pytest
        entry: uv run --no-sync pytest tests/ -q
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true
