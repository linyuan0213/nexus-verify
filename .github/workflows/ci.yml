name: CI

on:
  push:
    branches: [dev, release, master, main]
  pull_request:
    branches: [dev, release, master, main]
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "latest"
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync --dev
      - name: Ruff check
        run: uv run ruff check .

  typecheck:
    runs-on: ubuntu-latest
    name: Type Check
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "latest"
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync --dev
      - name: Pyright
        run: uv run pyright src/ tests/

  test:
    runs-on: ubuntu-latest
    name: Test
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "latest"
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync --dev
      - name: Run tests
        run: uv run pytest tests/ -v
